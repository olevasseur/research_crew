<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Navigator</title>
  <style>
    /* ── Reset + base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #ffffff;
      --bg2:      #f4f4f5;
      --bg3:      #e8e8ea;
      --border:   #d4d4d8;
      --text:     #18181b;
      --text2:    #52525b;
      --text3:    #a1a1aa;
      --accent:   #2563eb;
      --accent-h: #1d4ed8;
      --error:    #dc2626;
      --mono-bg:  #f8f8f9;
      --mono-fg:  #1e1e2e;
      --radius:   10px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #0f0f11;
        --bg2:      #1a1a1f;
        --bg3:      #27272e;
        --border:   #3f3f46;
        --text:     #e4e4e7;
        --text2:    #a1a1aa;
        --text3:    #52525b;
        --accent:   #3b82f6;
        --accent-h: #60a5fa;
        --error:    #f87171;
        --mono-bg:  #18181b;
        --mono-fg:  #d4d4d8;
      }
    }

    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      padding: 16px;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Typography ─────────────────────────────────────────────────── */
    h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: 4px; }
    h2 { font-size: 1rem;    font-weight: 600; margin-bottom: 14px; color: var(--text); }
    .subtitle { font-size: 0.85rem; color: var(--text2); margin-bottom: 24px; }

    /* ── Cards / sections ───────────────────────────────────────────── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
      margin-bottom: 16px;
    }

    /* ── Book buttons ────────────────────────────────────────────────── */
    .book-btn {
      display: block;
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: left;
      cursor: pointer;
      color: var(--text);
      transition: border-color 0.15s;
    }
    .book-btn:last-child { margin-bottom: 0; }
    .book-btn:active { background: var(--bg3); }
    .book-btn.active {
      border-color: var(--accent);
      background: var(--bg2);
    }
    .book-title   { font-size: 1rem;   font-weight: 600; display: block; }
    .book-author  { font-size: 0.85rem; color: var(--text2); display: block; margin-top: 2px; }
    .book-meta    { font-size: 0.78rem; color: var(--text3); display: block; margin-top: 2px; }

    /* ── Nav panel (hidden until book selected) ──────────────────────── */
    #nav-panel { display: none; }
    #selected-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 16px;
      display: block;
    }

    /* ── Form elements ───────────────────────────────────────────────── */
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="number"] {
      display: block;
      width: 100%;
      padding: 12px 14px;
      font-size: 1rem;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      appearance: none;
      -webkit-appearance: none;
    }
    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    input::placeholder { color: var(--text3); }

    .btn-run {
      display: block;
      width: 100%;
      padding: 13px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }
    .btn-run:active { background: var(--accent-h); }

    /* ── Hints ───────────────────────────────────────────────────────── */
    .hint {
      font-size: 0.8rem;
      color: var(--text3);
      margin-bottom: 12px;
      line-height: 1.4;
    }

    /* ── Output boxes ────────────────────────────────────────────────── */
    .output-wrap { display: none; margin-top: 14px; }
    .output-wrap.visible { display: block; }

    .output {
      background: var(--mono-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-family: "SF Mono", "Menlo", "Consolas", "Liberation Mono", monospace;
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--mono-fg);
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .output.is-error {
      color: var(--error);
      background: var(--bg2);
    }
    .output.is-loading { color: var(--text3); }

    /* ── Divider ─────────────────────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0 16px;
    }

    /* ── Section number badge ────────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <h1>Book Navigator</h1>
  <p class="subtitle">trace · explore · inspect</p>

  <!-- ── Books ──────────────────────────────────────────────────────── -->
  <div class="card">
    <h2>Books</h2>
    <div id="book-list"><p class="hint">Loading…</p></div>
  </div>

  <!-- ── Navigation panel ───────────────────────────────────────────── -->
  <div id="nav-panel">

    <span id="selected-label"></span>

    <!-- 1. Trace -->
    <div class="card">
      <div class="section-header">
        <span class="badge">1</span>
        <h2 style="margin-bottom:0">Trace an idea</h2>
      </div>
      <label for="trace-idea">Idea or concept</label>
      <input type="text" id="trace-idea" placeholder="e.g. solitude, attention economy">
      <button class="btn-run" onclick="runTrace()">Trace</button>
      <div class="output-wrap" id="trace-wrap">
        <div class="output" id="trace-out"></div>
      </div>
    </div>

    <!-- 2. Explore -->
    <div class="card">
      <div class="section-header">
        <span class="badge">2</span>
        <h2 style="margin-bottom:0">Explore a section</h2>
      </div>
      <p class="hint">Copy a section name from trace results above, or type a partial name.</p>
      <label for="explore-section">Section name</label>
      <input type="text" id="explore-section" placeholder="e.g. Chapter 4: Spend Time Alone">
      <button class="btn-run" onclick="runExplore()">Explore</button>
      <div class="output-wrap" id="explore-wrap">
        <div class="output" id="explore-out"></div>
      </div>
    </div>

    <!-- 3. Inspect window -->
    <div class="card">
      <div class="section-header">
        <span class="badge">3</span>
        <h2 style="margin-bottom:0">Inspect a window</h2>
      </div>
      <p class="hint">Window numbers repeat across sections — add the section name to be precise.</p>
      <label for="inspect-section">Section (recommended)</label>
      <input type="text" id="inspect-section" placeholder="e.g. Chapter 4: Spend Time Alone">
      <label for="inspect-window-num">Window number</label>
      <input type="number" id="inspect-window-num" placeholder="e.g. 2" min="1">
      <button class="btn-run" onclick="runInspect()">Inspect Window</button>
      <div class="output-wrap" id="inspect-wrap">
        <div class="output" id="inspect-out"></div>
      </div>
    </div>

  </div><!-- /nav-panel -->

  <script>
    let bookId = null;

    /* ── Books ───────────────────────────────────────────────────────── */
    async function loadBooks() {
      const el = document.getElementById('book-list');
      try {
        const r = await fetch('/books');
        const d = await r.json();
        if (!d.books || d.books.length === 0) {
          el.innerHTML = '<p class="hint">No books found. Ingest a book first.</p>';
          return;
        }
        el.innerHTML = d.books.map(b => `
          <button class="book-btn" onclick="selectBook('${esc(b.book_id)}', this)">
            <span class="book-title">${esc(b.title || b.book_id)}</span>
            ${b.author ? `<span class="book-author">${esc(b.author)}</span>` : ''}
            ${b.total_pages ? `<span class="book-meta">${b.total_pages} pages · ${b.total_chunks || '?'} chunks</span>` : ''}
          </button>`).join('');
      } catch (e) {
        el.innerHTML = '<p class="hint" style="color:var(--error)">Failed to load books.</p>';
      }
    }

    function selectBook(id, btn) {
      bookId = id;
      document.querySelectorAll('.book-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('selected-label').textContent = '📖 ' + id;
      document.getElementById('nav-panel').style.display = 'block';
      clearOutputs();
      window.scrollTo({ top: document.getElementById('nav-panel').offsetTop - 8, behavior: 'smooth' });
    }

    function clearOutputs() {
      ['trace-wrap','explore-wrap','inspect-wrap'].forEach(id => {
        document.getElementById(id).classList.remove('visible');
      });
    }

    /* ── Output helpers ──────────────────────────────────────────────── */
    function setOutput(wrapId, outId, text, kind) {
      // kind: 'loading' | 'error' | 'ok'
      const wrap = document.getElementById(wrapId);
      const out  = document.getElementById(outId);
      out.textContent = text;
      out.className = 'output' + (kind === 'error' ? ' is-error' : kind === 'loading' ? ' is-loading' : '');
      wrap.classList.add('visible');
      wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    /* ── Trace ───────────────────────────────────────────────────────── */
    async function runTrace() {
      if (!bookId) return;
      const idea = document.getElementById('trace-idea').value.trim();
      if (!idea) { setOutput('trace-wrap','trace-out','Please enter an idea to trace.','error'); return; }
      setOutput('trace-wrap','trace-out','Searching…','loading');
      try {
        const r = await fetch(`/books/${encodeURIComponent(bookId)}/trace?` + new URLSearchParams({ idea }));
        const d = await r.json();
        setOutput('trace-wrap','trace-out', r.ok ? d.output : (d.detail || 'Error'), r.ok ? 'ok' : 'error');
      } catch (e) { setOutput('trace-wrap','trace-out','Request failed: ' + e.message,'error'); }
    }

    /* ── Explore ─────────────────────────────────────────────────────── */
    async function runExplore() {
      if (!bookId) return;
      const section = document.getElementById('explore-section').value.trim();
      if (!section) { setOutput('explore-wrap','explore-out','Please enter a section name.','error'); return; }
      setOutput('explore-wrap','explore-out','Loading…','loading');
      try {
        const r = await fetch(`/books/${encodeURIComponent(bookId)}/explore?` + new URLSearchParams({ section }));
        const d = await r.json();
        setOutput('explore-wrap','explore-out', r.ok ? d.output : (d.detail || 'Error'), r.ok ? 'ok' : 'error');
      } catch (e) { setOutput('explore-wrap','explore-out','Request failed: ' + e.message,'error'); }
    }

    /* ── Inspect window ──────────────────────────────────────────────── */
    async function runInspect() {
      if (!bookId) return;
      const section = document.getElementById('inspect-section').value.trim();
      const win     = document.getElementById('inspect-window-num').value.trim();
      if (!win) { setOutput('inspect-wrap','inspect-out','Please enter a window number.','error'); return; }
      setOutput('inspect-wrap','inspect-out','Loading…','loading');
      try {
        const params = new URLSearchParams({ window: win });
        if (section) params.set('section', section);
        const r = await fetch(`/books/${encodeURIComponent(bookId)}/inspect-window?` + params);
        const d = await r.json();
        setOutput('inspect-wrap','inspect-out', r.ok ? d.output : (d.detail || 'Error'), r.ok ? 'ok' : 'error');
      } catch (e) { setOutput('inspect-wrap','inspect-out','Request failed: ' + e.message,'error'); }
    }

    /* ── Enter key support ───────────────────────────────────────────── */
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter' || e.shiftKey) return;
      const id = e.target.id;
      if (id === 'trace-idea')         runTrace();
      else if (id === 'explore-section') runExplore();
      else if (id === 'inspect-section' || id === 'inspect-window-num') runInspect();
    });

    /* ── Escaping helper for inline HTML ─────────────────────────────── */
    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadBooks();
  </script>
</body>
</html>
