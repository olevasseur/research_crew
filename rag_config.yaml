# RAG Configuration for Book Analysis Pipeline

embedding:
  model: "nomic-embed-text"
  base_url: "http://localhost:11434"

generation:
  model: "llama3.1"
  base_url: "http://localhost:11434"

chunking:
  target_size: 1500
  overlap: 200
  min_chunk_size: 100
  max_chunk_size: 2000

summarization:
  window_size: 8000
  window_overlap: 500
  budget_fast: 3
  budget_default: 6
  budget_thorough: 99
  always_include_first: true
  always_include_last: true
  selection_strategy: "content_diversity"   # "content_diversity" or "all"
  mmr_lambda: 0.7                           # balance relevance vs diversity (0=pure diversity, 1=pure relevance)
  verify_by_default: false
  cache_dir: "./data/cache"

retrieval:
  top_k: 10
  similarity_threshold: 0.0
  max_context_chunks: 20

vectorstore:
  type: "chroma"
  persist_directory: "./data/vectorstore"
  collection_name: "books"

storage:
  results_directory: "./data/results"
